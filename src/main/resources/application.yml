server:
  port: ${BACKEND_PORT}

spring:
  application:
    name: Traffic

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DEFAULT}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topics:
    inbound-color-topic: ${INBOUND_COLOR_TOPIC}
    inbound-status-topic: ${INBOUND_STATUS_TOPIC}
    outbound-activate-topic: ${OUTBOUND_ACTIVATE_TOPIC}

google:
  apis:
    maps:
      base-url: ${GOOGLE_MAPS_BASE_URL}
      api-key: ${GOOGLE_MAPS_API_KEY}